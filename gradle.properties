# Mod metadata
# The version of your mod
modVersion=1.0
# The name of your mod, this will be used as the name of the .jar
modName=Example Mod
# The mod id of your mod, this should never change
modId=examplemod
# Make this match with the package name that you choose
modPackageName=com.example.examplemod
# The description that will show in the mod menu
modDescription=An example mod
# The author name that will show in the mod menu
author=Steve